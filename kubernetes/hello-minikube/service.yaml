apiVersion: v1
kind: Service
metadata:
  name: hello-svc
spec:
  type: NodePort           # Einfacher Zugriff von außen (z. B. localhost)
  selector:
    app: hello
  ports:
    - protocol: TCP
      port: 80            # Service‑Port
      targetPort: 8080    # Port im Container
      nodePort: 30007     # Zufälliger Port >30000 (kann weggelassen werden)
