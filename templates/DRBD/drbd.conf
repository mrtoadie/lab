global { usage-count no; }
common { syncer { rate 100M; } }
resource r0 {
        protocol C;
        startup {
                wfc-timeout  15;
                degr-wfc-timeout 60;
        }
        net {
                cram-hmac-alg sha1;
                shared-secret "secret";
        }
        on cluster01 {
                device /dev/drbd0;
                disk /dev/sdb1;
                address 192.168.0.234:7788;
                meta-disk internal;
        }
        on cluster02 {
                device /dev/drbd0;
                disk /dev/sdb1;
                address 192.168.0.227:7788;
                meta-disk internal;
        }
}
